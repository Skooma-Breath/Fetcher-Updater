name: Fetcher updater stable prerelease

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: fetcher-tester-tools-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Build digest-backed tester tools package
        shell: pwsh
        run: |
          .\scripts\Build-FetcherTesterTools.ps1 `
            -OutputDir "${{ github.workspace }}\release-assets" `
            -SourceCommit "${{ github.sha }}"

      - name: Validate tester tools package and installer
        shell: pwsh
        run: |
          .\tests\Test-Package.ps1 `
            -ArchivePath "${{ github.workspace }}\release-assets\fetcher-tester-tools.zip"
          .\tests\Test-ClientInventory.ps1
          .\tests\Test-Integration.ps1 `
            -ArchivePath "${{ github.workspace }}\release-assets\fetcher-tester-tools.zip"

      - name: Replace stable tester tools prerelease
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .\scripts\Publish-StableGitHubRelease.ps1 `
            -Repository "${{ github.repository }}" `
            -Tag "fetcher-tester-tools" `
            -TargetCommit "${{ github.sha }}" `
            -Title "Fetcher Simulator Updater and Tester Tools" `
            -Notes "Install or refresh the Fetcher updater without copying individual files. Download and double-click Setup-Fetcher-Updater.bat once; subsequent updates are handled by Update-Fetcher-Simulator.bat." `
            -Assets @(
              "${{ github.workspace }}\release-assets\fetcher-tester-tools.zip"
              "${{ github.workspace }}\release-assets\Install-Fetcher-Tester-Tools.ps1"
              "${{ github.workspace }}\release-assets\Setup-Fetcher-Updater.bat"
              "${{ github.workspace }}\release-assets\fetcher-bardcraft-umo.json"
            )
